<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Open Sans', sans-serif;
    }

    h1{
            -webkit-text-size-adjust: 100%;
            --text--primary: #07122b;
            --cta--primary: #0099f6;
            --colors--pink: #ef457e;
            --background--gray: #f8f8f8;
            --background--blue: #f2faff;
            --colors--yellow: #ffd44d;
            --text--secondary: #6a7180;
            --others--blue: #0a32c3;
            --swiper-theme-color: #007aff;
            --swiper-navigation-size: 44px;
            color: var(--text--primary);
            cursor: auto;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            box-sizing: border-box;
            margin: .67em 0;
            margin-top: 0;
            margin-bottom: 0;
            font-family: "Dosis variant0", Tofu;
            color: white;
            text-align: center;
            font-weight: 900;
            line-height: 133%;
            font-size: 2.75rem;
        }

    nav.sticky .nav-links h1 a{
        color: #fff;
        transition: all 0.4s ease;
        }

        
    body {
        background: #ecececdb;
    }

    .card-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        max-width: 1250px;
        margin: 150px auto;
        padding: 20px;
        gap: 20px;
    }

    .card-list .card-item {
        background: #fff;
        padding: 26px;
        border-radius: 8px;
        box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.04);
        list-style: none;
        cursor: pointer;
        text-decoration: none;
        border: 2px solid transparent;
        transition: border 0.5s ease;
    }

    .card-list .card-item:hover {
        border: 2px solid #000;
    }

    .card-list .card-item img {
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: 8px;
        object-fit: cover;
    }

    .card-list span {
        display: inline-block;
        background: #F7DFF5;
        margin-top: 32px;
        padding: 8px 15px;
        font-size: 0.75rem;
        border-radius: 50px;
        font-weight: 600;
    }



    .card-item h3 {
        color: #000;
        font-size: 1.438rem;
        margin-top: 28px;
        font-weight: 600;
    }

    .card-item .arrow {
        display: flex;
        align-items: center;
        justify-content: center;
        transform: rotate(-35deg);
        height: 40px;
        width: 40px;
        color: white;
        border: 1px solid #000;
        border-radius: 50%;
        margin-top: 40px;
        transition: 0.2s ease;
    }

    .card-list .card-item:hover .arrow  {
        background: #000;
        color: green; 
    }

    @media (max-width: 1200px) {
        .card-list .card-item {
            padding: 15px;
        }
    }

    @media screen and (max-width: 980px) {
        .card-list {
            margin: 0 auto;
        }
    }  
    
    
    .des{
            padding: 3px;
            text-align: center;
            
            padding-top: 10px;
            border-bottom-right-radius: 5px;
            border-bottom-left-radius: 5px;
        }

        button{
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            --swiper-theme-color: #007aff;
            --swiper-navigation-size: 44px;
            font-family: DM Sans,sans-serif!important;
            display: inline-flex;
            -webkit-box-align: center;
            align-items: center;
            -webkit-box-pack: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: 0;
            border: 0;
            margin: 0;
            cursor: pointer;
            user-select: none;
            vertical-align: middle;
    
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            line-height: 1.75;
            text-transform: uppercase;
            min-width: 64px;
            padding: 6px 16px;
            border-radius: 4px;
            transition: background-color 250ms cubic-bezier(0.4, 0, 0.2, 1) 0ms,box-shadow 250ms cubic-bezier(0.4, 0, 0.2, 1) 0ms,border-color 250ms cubic-bezier(0.4, 0, 0.2, 1) 0ms,color 250ms cubic-bezier(0.4, 0, 0.2, 1) 0ms;
            background-color: black;
            box-shadow: none;
            color: white;
            letter-spacing: 0.1em;
            width: 100%;
            text-align: center;
            }
        button:hover{
            background-color: black;
            color: white;
            transition: .5s;
            cursor: pointer;
        }

            /* Google Font Import Link */
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap');
        *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        text-decoration: none;
        font-family: 'Ubuntu', sans-serif;
        }
        nav{
        position: fixed;
        background-color: #24b8fd;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px;
        transition: all 0.4s ease;
        }
        nav.sticky{
        padding: 15px 20px;
        background: black;
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }
        nav .nav-content{
        height: 100%;
        max-width: 1200px;
        margin: auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        }
        nav .logo a{
        font-weight: 500;
        font-size: 35px;
        color: black;
        }
        nav.sticky .logo a{
        color: #fff;
        }
        .nav-content .nav-links{
        display: flex;
        }
        .nav-content .nav-links li{
        list-style: none;
        margin: 0 8px;
        }
        .nav-links li a{
        text-decoration: none;
        color: #0E2431;
        font-size: 18px;
        font-weight: 500;
        padding: 10px 4px;
        transition: all 0.3s ease;
        }
        .nav-links li a:hover{
        color: black;
        }
        nav.sticky .nav-links li a{
        color: #fff;
        transition: all 0.4s ease;
        }
        nav.sticky .nav-links li a:hover{
        color: #0E2431;
        }
        .home{
        height: 100vh;
        width: 100%;
        background: url("images/background.png") no-repeat;
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        font-family: 'Ubuntu', sans-serif;
        }
        h2{
        font-size: 30px;
        margin-bottom: 6px;
        color: black;
        }
        .text{
        text-align: justify;
        padding: 40px 80px;
        box-shadow: -5px 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
          <div class="logo">
            <h1 href="#" class="logo">3D</h1>
          </div>
          <ul class="nav-links">
            <li><a href="http://127.0.0.1:5501/index.html">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Skills</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </div>
      </nav>

      <script>
        let nav = document.querySelector("nav");
          window.onscroll = function() {
            if(document.documentElement.scrollTop > 20){
              nav.classList.add("sticky");
            }else {
              nav.classList.remove("sticky");
            }
          }
        </script>
      


    <div class="main">

        <div class="card-list">
           
  </div>
</div>
</body>
</html>
